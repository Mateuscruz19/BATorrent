name: clang-tidy

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-tidy:
    name: clang-tidy + Clang Static Analyzer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: qtmultimedia
          cache: true

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libtorrent-rasterbar-dev libboost-dev libssl-dev libgl-dev libglx-dev libegl-dev
          version: 3.0

      # The default Ubuntu clang-tidy (v14) can't parse Qt 6.7 / libstdc++-12
      # headers. Use a modern LLVM so the frontend handles them, and build with
      # the same clang so the flags in compile_commands match.
      - name: Install LLVM 17
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          sudo add-apt-repository -y 'deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main'
          sudo apt-get update
          sudo apt-get install -y clang-17 clang-tidy-17

      - name: Configure + build (clang-17, exports compile_commands)
        env:
          CC: clang-17
          CXX: clang++-17
          BAT_TMDB_KEY: ${{ secrets.TMDB_API_KEY }}
          BAT_IGDB_ID: ${{ secrets.IGDB_CLIENT_ID }}
          BAT_IGDB_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build -j$(nproc)

      - name: Run clang-tidy
        run: |
          # Active code paths only — the legacy QWidget UI (reachable via
          # --legacy) is being phased out and isn't worth linting.
          files=$(git ls-files 'src/app/*.cpp' 'src/torrent/*.cpp' 'src/webui/*.cpp' \
                  src/main.cpp src/gui/qmlposterbridge.cpp src/gui/thememanager.cpp)
          run-clang-tidy-17 -p build -quiet $files 2>&1 | tee tidy.log
          if grep -qE ": (warning|error): " tidy.log; then
            echo "::error::clang-tidy found issues"; exit 1
          fi
